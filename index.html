<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Heart</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Segoe UI;
}

canvas{
position:absolute;
top:0;
left:0;
}

#cursor{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:white;
box-shadow:0 0 10px white,0 0 25px pink;
pointer-events:none;
}

#msg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
text-align:center;
opacity:0;
color:#ff4da6;
text-shadow:0 0 10px #ff4da6,0 0 30px #ff1a75;
transition:2s;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="cursor"></div>

<div id="msg">
HAPPY BIRTHDAY<br>
my bujii kanaa<br>
love you
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const cursor=document.getElementById("cursor")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let t=0
let points=[]
let particles=[]
let fireworks=[]

function heart(t){
return{
x:16*Math.pow(Math.sin(t),3),
y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
}
}

/* HALF MOON */

function drawMoon(){

let x = canvas.width - 120
let y = 100

ctx.shadowBlur = 25
ctx.shadowColor = "white"

ctx.beginPath()
ctx.arc(x,y,40,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

ctx.beginPath()
ctx.arc(x+15,y,40,0,Math.PI*2)
ctx.fillStyle="black"
ctx.fill()

ctx.shadowBlur = 0

}

/* SPARKLES */

function sparkle(x,y){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,
life:40
})

}

function drawParticles(){

for(let i=particles.length-1;i>=0;i--){

let p=particles[i]

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle="pink"
ctx.fill()

p.x+=p.vx
p.y+=p.vy
p.life--

if(p.life<=0) particles.splice(i,1)

}

}

/* FIREWORKS */

function createFirework(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<60;i++){

fireworks.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:80,
color:"hsl("+Math.random()*360+",100%,60%)"
})

}

}

function drawFireworks(){

for(let i=fireworks.length-1;i>=0;i--){

let p=fireworks[i]

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle=p.color
ctx.fill()

p.x+=p.vx
p.y+=p.vy
p.life--

if(p.life<=0) fireworks.splice(i,1)

}

}

/* HEART DRAWING */

function drawHeart(){

let pos=heart(t)

let scale=18

let x=canvas.width/2+pos.x*scale
let y=canvas.height/2-pos.y*scale

points.push({x,y})

ctx.beginPath()

for(let i=0;i<points.length;i++){

let p=points[i]

if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

}

ctx.strokeStyle="#ff1a75"
ctx.lineWidth=3
ctx.shadowBlur=15
ctx.shadowColor="#ff1a75"
ctx.stroke()

sparkle(x,y)

cursor.style.left=x+"px"
cursor.style.top=y+"px"

t+=0.004

if(t>Math.PI*2){
document.getElementById("msg").style.opacity=1
}

}

/* MAIN LOOP */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawMoon()

drawHeart()
drawParticles()
drawFireworks()

if(Math.random()<0.03) createFirework()

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
